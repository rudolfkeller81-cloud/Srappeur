<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Srappeur">
  <meta name="theme-color" content="#05070f">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>Srappeur</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #05070f;
      --s1: #0a0e1a;
      --s2: #0f1424;
      --s3: #141929;
      --border: rgba(255,255,255,0.06);
      --border2: rgba(255,255,255,0.1);
      --accent: #4f6ef7;
      --accent2: #7c3aed;
      --glow: rgba(79,110,247,0.2);
      --green: #10b981;
      --red: #ef4444;
      --orange: #f59e0b;
      --t1: #f8fafc;
      --t2: #94a3b8;
      --t3: #475569;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--t1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Nav ── */
    nav {
      height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      padding-top: env(safe-area-inset-top);
      border-bottom: 1px solid var(--border);
      background: rgba(5,7,15,0.95);
      backdrop-filter: blur(20px);
      z-index: 200;
      flex-shrink: 0;
    }

    .nav-left { display: flex; align-items: center; gap: 10px; }

    .logo-mark {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      box-shadow: 0 0 16px var(--glow);
    }

    .logo-name { font-size: 15px; font-weight: 700; }
    .pill {
      font-size: 10px; font-weight: 600; color: var(--t3);
      background: var(--s2); border: 1px solid var(--border);
      padding: 2px 8px; border-radius: 99px; text-transform: uppercase;
    }

    /* ── Bouton historique mobile ── */
    .btn-history-mobile {
      display: none;
      align-items: center; gap: 6px;
      background: var(--s2); border: 1px solid var(--border);
      color: var(--t2); border-radius: 8px; padding: 6px 12px;
      font-size: 12px; font-weight: 600; font-family: inherit;
      cursor: pointer;
    }

    /* ── Layout ── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar desktop ── */
    aside {
      width: 240px; flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--s1);
      display: flex; flex-direction: column; overflow: hidden;
    }

    .sidebar-header {
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }

    .sidebar-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--t3); }

    .btn-clear { font-size: 11px; color: var(--t3); background: none; border: none; cursor: pointer; font-family: inherit; padding: 3px 6px; border-radius: 5px; transition: color 0.15s; }
    .btn-clear:hover { color: var(--red); }

    .history-list { flex: 1; overflow-y: auto; padding: 6px; }
    .history-list::-webkit-scrollbar { width: 3px; }
    .history-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

    .hist-empty { padding: 28px 12px; text-align: center; color: var(--t3); font-size: 12px; line-height: 1.6; }
    .hist-empty-icon { font-size: 24px; margin-bottom: 8px; opacity: 0.3; }

    .hist-item {
      position: relative; padding: 10px 11px; border-radius: 9px;
      cursor: pointer; transition: background 0.12s; margin-bottom: 2px;
    }

    .hist-item:hover { background: var(--s2); }
    .hist-item.active { background: rgba(79,110,247,0.1); border: 1px solid rgba(79,110,247,0.2); }

    .hist-title { font-size: 12px; font-weight: 600; color: var(--t1); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 22px; }
    .hist-meta { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--t3); }
    .hist-count { background: var(--s3); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; font-size: 10px; font-weight: 600; color: var(--t2); }

    .hist-del { position: absolute; top: 8px; right: 6px; width: 18px; height: 18px; border-radius: 4px; background: none; border: none; cursor: pointer; display: none; align-items: center; justify-content: center; color: var(--t3); font-size: 11px; }
    .hist-item:hover .hist-del { display: flex; }
    .hist-del:hover { background: rgba(239,68,68,0.1); color: var(--red); }

    /* ── Drawer mobile (historique) ── */
    .drawer-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 300; backdrop-filter: blur(4px);
    }

    .drawer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--s1); border-top: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      z-index: 301; max-height: 70vh;
      display: flex; flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom);
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }

    .drawer.open { transform: translateY(0); }
    .drawer-overlay.open { display: block; }

    .drawer-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 99px; margin: 12px auto 0; }
    .drawer-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .drawer-title { font-size: 14px; font-weight: 700; }
    .drawer-list { overflow-y: auto; padding: 8px; flex: 1; }

    /* ── Main ── */
    .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
    .main::-webkit-scrollbar { width: 4px; }
    .main::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

    .content { max-width: 820px; margin: 0 auto; padding: 32px 20px 80px; width: 100%; }

    /* ── Hero ── */
    .hero { text-align: center; margin-bottom: 32px; }

    .hero-tag {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 10px; font-weight: 700; color: var(--accent);
      background: rgba(79,110,247,0.08); border: 1px solid rgba(79,110,247,0.2);
      padding: 3px 10px; border-radius: 99px; margin-bottom: 14px;
      text-transform: uppercase; letter-spacing: 0.08em;
    }

    .hero h1 {
      font-size: clamp(24px, 5vw, 42px); font-weight: 800; letter-spacing: -1px; line-height: 1.1; margin-bottom: 8px;
      background: linear-gradient(135deg, #fff 40%, rgba(255,255,255,0.4));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .hero p { font-size: 13px; color: var(--t2); }

    /* ── Card ── */
    .card {
      background: linear-gradient(145deg, var(--s1), var(--s2));
      border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 24px;
      box-shadow: 0 16px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .fields { display: grid; grid-template-columns: 1fr 1fr 100px; gap: 10px; margin-bottom: 16px; }

    .field-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--t3); margin-bottom: 6px; }

    .input-box {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg); border: 1px solid var(--border2);
      border-radius: 10px; padding: 0 12px; height: 44px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,110,247,0.12); }
    .input-box svg { flex-shrink: 0; opacity: 0.35; }
    .input-box input { flex: 1; background: none; border: none; outline: none; color: var(--t1); font-size: 15px; font-family: inherit; font-weight: 500; width: 100%; }
    .input-box input::placeholder { color: var(--t3); font-weight: 400; }
    input[type=number]::-webkit-inner-spin-button { opacity: 0.3; }

    .search-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

    .btn-search {
      position: relative; overflow: hidden;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; border-radius: 10px;
      padding: 0 22px; height: 44px; min-width: 140px;
      font-size: 15px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(79,110,247,0.35);
    }

    .btn-search::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 100%); }
    .btn-search:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,110,247,0.5); }
    .btn-search:active { transform: scale(0.98); }
    .btn-search:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

    .toggle-wrap { display: flex; align-items: center; gap: 9px; cursor: pointer; user-select: none; }
    .toggle-input { display: none; }
    .toggle-track { width: 36px; height: 20px; background: var(--s3); border: 1px solid var(--border2); border-radius: 99px; position: relative; transition: background 0.2s; }
    .toggle-track::after { content: ''; position: absolute; width: 14px; height: 14px; background: var(--t2); border-radius: 50%; top: 2px; left: 2px; transition: transform 0.2s, background 0.2s; }
    .toggle-input:checked ~ .toggle-track { background: var(--accent); }
    .toggle-input:checked ~ .toggle-track::after { transform: translateX(16px); background: #fff; }
    .toggle-text { font-size: 12px; color: var(--t2); }
    .toggle-text em { font-style: normal; color: var(--t3); }

    /* ── Status / Error ── */
    .status-bar { display: none; align-items: center; gap: 12px; background: var(--s1); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; margin-bottom: 18px; }
    .spinner { width: 18px; height: 18px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-msg { font-size: 13px; color: var(--t2); }
    .error-bar { display: none; align-items: center; gap: 10px; background: rgba(239,68,68,0.05); border: 1px solid rgba(239,68,68,0.15); border-radius: 10px; padding: 12px 16px; margin-bottom: 18px; font-size: 13px; color: var(--red); }

    /* ── Results ── */
    .results-section { display: none; }

    .results-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
    .results-meta { font-size: 13px; color: var(--t2); }
    .results-meta strong { color: var(--t1); font-weight: 700; font-size: 15px; }

    .btn-dl { display: inline-flex; align-items: center; gap: 6px; background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.2); color: var(--green); border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer; }
    .btn-dl:hover { background: rgba(16,185,129,0.14); }

    /* ── Stats ── */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
    .stat { background: var(--s1); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
    .stat-val { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; color: var(--t1); margin-bottom: 2px; }
    .stat-label { font-size: 10px; color: var(--t3); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600; }

    /* ── Table (desktop) ── */
    .table-card { background: var(--s1); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: var(--s2); border-bottom: 1px solid var(--border); }
    th { padding: 11px 16px; text-align: left; font-size: 10px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    tbody tr:hover .row-accent { opacity: 1; }
    td { padding: 13px 16px; vertical-align: middle; position: relative; }
    td:first-child { position: relative; }
    .row-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: linear-gradient(180deg, var(--accent), var(--accent2)); border-radius: 0 2px 2px 0; opacity: 0; transition: opacity 0.12s; }

    .company-name { font-size: 13px; font-weight: 600; color: var(--t1); margin-bottom: 2px; }
    .company-loc { font-size: 11px; color: var(--t3); display: flex; align-items: center; gap: 4px; }
    .dep-chip { background: var(--s3); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; font-size: 10px; font-weight: 600; color: var(--t3); }

    .tel-link { display: inline-flex; align-items: center; gap: 5px; color: var(--green); text-decoration: none; font-size: 12px; font-weight: 600; padding: 5px 10px; background: rgba(16,185,129,0.06); border: 1px solid rgba(16,185,129,0.15); border-radius: 7px; white-space: nowrap; }
    .tel-link:hover { background: rgba(16,185,129,0.12); }
    .site-link { display: inline-flex; align-items: center; gap: 4px; color: #60a5fa; text-decoration: none; font-size: 12px; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .site-link:hover { color: var(--accent); }

    .note-cell { display: flex; align-items: center; gap: 5px; }
    .note-num { font-size: 13px; font-weight: 700; }
    .note-stars { color: #fbbf24; font-size: 10px; }
    .note-count { font-size: 10px; color: var(--t3); }

    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 9px; border-radius: 7px; font-size: 11px; font-weight: 700; white-space: nowrap; }
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .badge-ok  { background: rgba(16,185,129,0.08); color: #34d399; border: 1px solid rgba(16,185,129,0.2); }
    .badge-ok .dot { background: #34d399; box-shadow: 0 0 5px #34d399; }
    .badge-nok { background: rgba(239,68,68,0.08); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
    .badge-nok .dot { background: #f87171; }
    .badge-tmp { background: rgba(245,158,11,0.08); color: #fbbf24; border: 1px solid rgba(245,158,11,0.2); }
    .badge-tmp .dot { background: #fbbf24; }
    .badge-unk { background: var(--s3); color: var(--t3); border: 1px solid var(--border); }
    .badge-unk .dot { background: var(--t3); }

    .dash { color: var(--t3); font-size: 16px; }

    /* ── Cards mobile ── */
    .cards-list { display: none; flex-direction: column; gap: 10px; }

    .prospect-card {
      background: var(--s1); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px; position: relative;
      transition: border-color 0.15s;
    }

    .prospect-card:active { border-color: var(--border2); }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
    .card-name { font-size: 15px; font-weight: 700; color: var(--t1); margin-bottom: 3px; line-height: 1.3; }
    .card-loc { font-size: 12px; color: var(--t3); display: flex; align-items: center; gap: 5px; }

    .card-actions { display: flex; gap: 8px; margin-bottom: 12px; }

    .btn-call {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--green); color: #fff; text-decoration: none;
      border-radius: 10px; padding: 12px; font-size: 15px; font-weight: 700;
      box-shadow: 0 4px 14px rgba(16,185,129,0.3);
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-call:active { transform: scale(0.97); opacity: 0.9; }
    .btn-call.disabled { background: var(--s3); color: var(--t3); box-shadow: none; pointer-events: none; }

    .btn-web {
      display: flex; align-items: center; justify-content: center;
      background: var(--s2); border: 1px solid var(--border2);
      color: var(--t2); text-decoration: none;
      border-radius: 10px; padding: 12px 14px; font-size: 18px;
      transition: background 0.15s;
    }

    .btn-web:active { background: var(--s3); }
    .btn-web.disabled { opacity: 0.3; pointer-events: none; }

    .card-footer { display: flex; align-items: center; justify-content: space-between; }
    .card-note { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--t2); }
    .card-note-stars { color: #fbbf24; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      aside { display: none; }
      .btn-history-mobile { display: flex; }
      .content { padding: 20px 14px 80px; }
      .fields { grid-template-columns: 1fr; gap: 10px; }
      .field-label { display: none; }
      .btn-search { flex: 1; min-width: unset; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .hero { margin-bottom: 20px; }
      .hero p { display: none; }
      /* Cache table, montre cards */
      .table-card { display: none; }
      .cards-list { display: flex; }
    }

    @media (min-width: 769px) {
      .cards-list { display: none !important; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-left">
    <img src="/icons/icon.svg" width="28" height="28" style="border-radius:7px;" alt="">
    <span class="logo-name">Srappeur</span>
    <span class="pill">B2B</span>
  </div>
  <button class="btn-history-mobile" onclick="openDrawer()">🕐 Historique</button>
</nav>

<!-- Drawer mobile -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <span class="drawer-title">Historique</span>
    <button class="btn-clear" onclick="clearAll()">Effacer tout</button>
  </div>
  <div class="drawer-list" id="drawerList"></div>
</div>

<div class="layout">

  <!-- Sidebar desktop -->
  <aside>
    <div class="sidebar-header">
      <span class="sidebar-title">Historique</span>
      <button class="btn-clear" onclick="clearAll()">Tout effacer</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="hist-empty"><div class="hist-empty-icon">🕐</div>Vos recherches apparaîtront ici</div>
    </div>
  </aside>

  <div class="main">
    <div class="content">

      <div class="hero">
        <div class="hero-tag">✦ Étude de marché B2B</div>
        <h1>Trouvez vos prospects</h1>
        <p>Google Places · Vérification INSEE · Export CSV</p>
      </div>

      <div class="card">
        <div class="fields">
          <div>
            <div class="field-label">Catégorie</div>
            <div class="input-box">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
              <input type="text" id="category" placeholder="plombier, électricien..." value="plombier">
            </div>
          </div>
          <div>
            <div class="field-label">Ville ou département</div>
            <div class="input-box">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              <input type="text" id="location" placeholder="Lyon, Mazamet, 69...">
            </div>
          </div>
          <div>
            <div class="field-label">Max</div>
            <div class="input-box">
              <input type="number" id="max" min="1" max="60" value="20" style="text-align:center;">
            </div>
          </div>
        </div>
        <div class="search-row">
          <button class="btn-search" id="searchBtn" onclick="doSearch()">Rechercher →</button>
          <label class="toggle-wrap">
            <input class="toggle-input" type="checkbox" id="sireneCheck">
            <div class="toggle-track"></div>
            <span class="toggle-text">SIRENE <em>(+ lent)</em></span>
          </label>
        </div>
      </div>

      <div class="status-bar" id="statusBar">
        <div class="spinner"></div>
        <span class="status-msg" id="statusMsg">Recherche en cours...</span>
      </div>

      <div class="error-bar" id="errorBar">⚠ <span id="errorText"></span></div>

      <div class="results-section" id="resultsSection">
        <div class="results-top">
          <div class="results-meta" id="resultsMeta"></div>
          <button class="btn-dl" onclick="exportCSV()">⬇ CSV</button>
        </div>

        <div class="stats" id="statsRow"></div>

        <!-- Table desktop -->
        <div class="table-card">
          <table>
            <thead>
              <tr>
                <th>Entreprise</th>
                <th>Téléphone</th>
                <th>Site Web</th>
                <th>Note</th>
                <th>Statut</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>

        <!-- Cards mobile -->
        <div class="cards-list" id="cardsList"></div>
      </div>

    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'srappeur_history_v2';
  let currentData = [], currentFilename = '', currentId = null;

  // ── History ──
  function getHistory() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; } }
  function saveHistory(h) { localStorage.setItem(STORAGE_KEY, JSON.stringify(h)); }

  function addToHistory(entry) {
    const h = getHistory().filter(e => !(e.category === entry.category && e.location === entry.location));
    h.unshift(entry);
    saveHistory(h.slice(0, 50));
    renderHistory();
  }

  function deleteEntry(id) {
    saveHistory(getHistory().filter(e => e.id !== id));
    renderHistory();
  }

  function clearAll() {
    if (!confirm('Effacer tout l\'historique ?')) return;
    saveHistory([]); renderHistory(); closeDrawer();
  }

  function histHTML(h) {
    return `
      <div class="hist-item ${currentId === h.id ? 'active' : ''}" onclick="loadHistory('${h.id}')">
        <div class="hist-title">${esc(h.category)} · ${esc(h.location)}</div>
        <div class="hist-meta">
          <span>${fmtDate(h.date)}</span>
          <span class="hist-count">${h.total}</span>
        </div>
        <button class="hist-del" onclick="event.stopPropagation();deleteEntry('${h.id}')">✕</button>
      </div>`;
  }

  function emptyHTML() {
    return `<div class="hist-empty"><div class="hist-empty-icon">🕐</div>Vos recherches apparaîtront ici</div>`;
  }

  function renderHistory() {
    const h = getHistory();
    const html = h.length ? h.map(histHTML).join('') : emptyHTML();
    document.getElementById('historyList').innerHTML = html;
    document.getElementById('drawerList').innerHTML = html;
  }

  function loadHistory(id) {
    const h = getHistory().find(e => e.id === id);
    if (!h) return;
    currentId = id; currentData = h.companies;
    currentFilename = `prospects_${slug(h.category)}_${slug(h.location)}_${h.date.slice(0,10).replace(/-/g,'')}.csv`;
    document.getElementById('category').value = h.category;
    document.getElementById('location').value = h.location;
    document.getElementById('max').value = h.max;
    renderResults(h.companies, h.category, h.location);
    renderHistory();
    closeDrawer();
    document.querySelector('.main').scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── Drawer ──
  function openDrawer() {
    document.getElementById('drawer').classList.add('open');
    document.getElementById('drawerOverlay').classList.add('open');
  }

  function closeDrawer() {
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('drawerOverlay').classList.remove('open');
  }

  // ── Search ──
  async function doSearch() {
    const cat = document.getElementById('category').value.trim();
    const loc = document.getElementById('location').value.trim();
    const max = parseInt(document.getElementById('max').value) || 20;
    const sirene = document.getElementById('sireneCheck').checked;

    if (!cat || !loc) { showError('Remplissez la catégorie et la localité.'); return; }

    setLoading(true);
    setStatus(`Recherche "${cat}" à "${loc}"…`);
    hideError();
    document.getElementById('resultsSection').style.display = 'none';

    try {
      const res = await fetch('/api/search', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ category: cat, location: loc, max, sirene }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Erreur serveur');

      currentId = Date.now().toString();
      currentData = data.companies;
      currentFilename = `prospects_${slug(cat)}_${slug(loc)}_${today()}.csv`;

      addToHistory({ id: currentId, category: cat, location: loc, max, total: data.total, date: new Date().toISOString(), companies: data.companies });
      renderResults(data.companies, cat, loc);

    } catch (e) { showError(e.message); }
    finally { setLoading(false); }
  }

  function renderResults(companies, cat, loc) {
    // Stats
    const total = companies.length;
    const avecTel = companies.filter(c => c.telephone).length;
    const avecSite = companies.filter(c => c.site_web).length;
    const notes = companies.filter(c => c.note_google).map(c => parseFloat(c.note_google));
    const moy = notes.length ? (notes.reduce((a,b)=>a+b,0)/notes.length).toFixed(1) : '—';

    document.getElementById('resultsMeta').innerHTML = `<strong>${total}</strong> résultat${total>1?'s':''} · ${esc(cat)} · ${esc(loc)}`;
    document.getElementById('statsRow').innerHTML = `
      <div class="stat"><div class="stat-val">${total}</div><div class="stat-label">Entreprises</div></div>
      <div class="stat"><div class="stat-val">${avecTel}</div><div class="stat-label">Téléphone</div></div>
      <div class="stat"><div class="stat-val">${avecSite}</div><div class="stat-label">Site web</div></div>
      <div class="stat"><div class="stat-val">${moy}</div><div class="stat-label">Note moy. ★</div></div>`;

    // Table desktop
    document.getElementById('tbody').innerHTML = companies.map(c => {
      const stars = c.note_google ? '★'.repeat(Math.round(parseFloat(c.note_google))) : '';
      return `<tr>
        <td><div class="row-accent"></div><div class="company-name">${esc(c.nom)}</div><div class="company-loc">${esc(c.ville||'—')}${c.departement?`<span class="dep-chip">${esc(c.departement)}</span>`:''}</div></td>
        <td>${c.telephone?`<a class="tel-link" href="tel:${esc(c.telephone)}">📞 ${esc(c.telephone)}</a>`:`<span class="dash">—</span>`}</td>
        <td>${c.site_web?`<a class="site-link" href="${esc(c.site_web)}" target="_blank">🔗 ${shortUrl(c.site_web)}</a>`:`<span class="dash">—</span>`}</td>
        <td>${c.note_google?`<div class="note-cell"><span class="note-num">${esc(c.note_google)}</span><span class="note-stars">${stars}</span><span class="note-count">(${esc(c.nombre_avis)})</span></div>`:`<span class="dash">—</span>`}</td>
        <td>${mkBadge(c.statut_sirene||c.statut)}</td>
      </tr>`;
    }).join('');

    // Cards mobile
    document.getElementById('cardsList').innerHTML = companies.map(c => {
      const stars = c.note_google ? '★'.repeat(Math.round(parseFloat(c.note_google))) : '';
      return `
      <div class="prospect-card">
        <div class="card-top">
          <div>
            <div class="card-name">${esc(c.nom)}</div>
            <div class="card-loc">${esc(c.ville||'—')}${c.departement?`<span class="dep-chip">${esc(c.departement)}</span>`:''}</div>
          </div>
          ${mkBadge(c.statut_sirene||c.statut)}
        </div>
        <div class="card-actions">
          ${c.telephone
            ? `<a class="btn-call" href="tel:${esc(c.telephone)}">📞 ${esc(c.telephone)}</a>`
            : `<span class="btn-call disabled">Pas de téléphone</span>`}
          ${c.site_web
            ? `<a class="btn-web" href="${esc(c.site_web)}" target="_blank">🌐</a>`
            : `<span class="btn-web disabled">🌐</span>`}
        </div>
        <div class="card-footer">
          <div class="card-note">
            ${c.note_google
              ? `<span class="card-note-stars">${stars}</span><span>${esc(c.note_google)}</span><span style="color:var(--t3)">(${esc(c.nombre_avis)} avis)</span>`
              : `<span style="color:var(--t3)">Pas de note</span>`}
          </div>
        </div>
      </div>`;
    }).join('');

    document.getElementById('resultsSection').style.display = 'block';
  }

  function mkBadge(s) {
    if (!s||s==='non vérifié') return `<span class="badge badge-unk"><span class="dot"></span>—</span>`;
    if (s==='active') return `<span class="badge badge-ok"><span class="dot"></span>Active</span>`;
    if (s==='fermée') return `<span class="badge badge-nok"><span class="dot"></span>Fermée</span>`;
    if (s==='fermée temporairement') return `<span class="badge badge-tmp"><span class="dot"></span>Temp.</span>`;
    return `<span class="badge badge-unk"><span class="dot"></span>${esc(s)}</span>`;
  }

  async function exportCSV() {
    if (!currentData.length) return;
    const res = await fetch('/api/export-csv', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ companies: currentData, filename: currentFilename }),
    });
    const blob = await res.blob();
    const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: currentFilename });
    a.click(); URL.revokeObjectURL(a.href);
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

  function setLoading(on) { document.getElementById('searchBtn').disabled = on; document.getElementById('statusBar').style.display = on ? 'flex' : 'none'; }
  function setStatus(m) { document.getElementById('statusMsg').textContent = m; }
  function showError(m) { document.getElementById('errorText').textContent = m; document.getElementById('errorBar').style.display = 'flex'; }
  function hideError() { document.getElementById('errorBar').style.display = 'none'; }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function shortUrl(u) { return u.replace(/^https?:\/\/(www\.)?/,'').replace(/\/$/,'').substring(0,28); }
  function slug(s) { return s.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,''); }
  function today() { return new Date().toISOString().slice(0,10).replace(/-/g,''); }
  function fmtDate(iso) {
    const d = new Date(iso), now = new Date(), diff = now - d;
    if (diff < 60000) return 'À l\'instant';
    if (diff < 3600000) return `${Math.floor(diff/60000)} min`;
    if (diff < 86400000) return `${Math.floor(diff/3600000)}h`;
    return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
  }

  renderHistory();
</script>
</body>
</html>
